services:
  link-tree-backend-dev:
    build:
      context: .
      dockerfile: Dockerfile.development
      target: development
    container_name: link-tree-backend-dev
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - /app/node_modules
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --tries=1 --spider http://localhost:8080/api/v1/health && wget --quiet --tries=1 --spider http://localhost:8080/api/v1/health/db || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped