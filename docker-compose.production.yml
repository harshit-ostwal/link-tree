services:
  link-tree-backend:
    build:
      context: .
      dockerfile: Dockerfile.production
      target: production
    container_name: link-tree-backend
    env_file:
      - .env
      - .env.production
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --tries=1 --spider http://localhost:8080/api/v1/health && wget --quiet --tries=1 --spider http://localhost:8080/api/v1/health/db || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
