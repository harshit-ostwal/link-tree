name: PR Check

on:
  pull_request:
    branches:
      - "**"

  push:
    branches:
      - "**"

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4

        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Check Formatting
        run: bunx biome check --write

      - name: Lint Code
        run: bunx biome lint --write

      - name: Formatting Code
        run: bunx biome format --write

  test:
    runs-on: ubuntu-latest
    needs: lint-and-build
    environment: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Create .env
        run: |
          cat > .env << EOF
          NODE_ENV=${{ vars.NODE_ENV }}
          DOTENV_DEBUG=${{ vars.DOTENV_DEBUG }}
          LOG_LEVEL=${{ vars.LOG_LEVEL }}
          PORT=${{ vars.PORT }}
          ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}
          BACKEND_URL=${{ vars.BACKEND_URL }}
          FRONTEND_URL=${{ vars.FRONTEND_URL }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          GOOGLE_CLIENT_ID=${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL=${{ vars.OAUTH_GOOGLE_CALLBACK_URL }}
          GITHUB_CLIENT_ID=${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET=${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
          GITHUB_CALLBACK_URL=${{ vars.OAUTH_GITHUB_CALLBACK_URL }}
          COOKIE_SECRET_KEY=${{ secrets.COOKIE_SECRET_KEY }}
          ACCESS_TOKEN_SECRET=${{ secrets.ACCESS_TOKEN_SECRET }}
          ACCESS_TOKEN_EXPIRY=${{ vars.ACCESS_TOKEN_EXPIRY }}
          REFRESH_TOKEN_SECRET=${{ secrets.REFRESH_TOKEN_SECRET }}
          REFRESH_TOKEN_EXPIRY=${{ vars.REFRESH_TOKEN_EXPIRY }}
          REFRESH_TOKEN_EXPIRY_MS=${{ vars.REFRESH_TOKEN_EXPIRY_MS }}
          EOF

      - name: Verify Env
        run: |
          test -f .env && echo ".env created successfully"

      - name: Prisma Generate
        run: bunx prisma generate

      - name: Start Server in Background
        run: |
          nohup bun dev > server.log 2>&1 &

          echo "Server started in background (check server.log)."
          sleep 1
          tail -n 20 server.log || true

      - name: Wait for service to become healthy
        run: |
          set -euo pipefail
          URL="http://localhost:${PORT:-8080}/api/v1/health"
          ATTEMPTS=30
          SLEEP_SECS=2

          echo "Waiting for service to become healthy at: $URL"
          i=0
          until [ $i -ge $ATTEMPTS ]; do
            if curl -fsS "$URL" >/dev/null 2>&1; then
              echo "Service is healthy."
              exit 0
            fi
            i=$((i+1))
            echo "Waiting... ($i/$ATTEMPTS)"
            sleep "$SLEEP_SECS"
          done

          echo "Service did not become healthy after $ATTEMPTS attempts."
          echo "====== Last 200 lines of server.log ======"
          tail -n 200 server.log || true
          echo "=========================================="
          exit 1

      - name: Call Health Check API (final verify)
        run: |
          echo "Final health-check..."
          curl -f http://localhost:${PORT}/api/v1/health

      - name: Call Health Check DB API (final verify)
        run: |
          echo "Final health-check for DB..."
          curl -f http://localhost:${PORT}/api/v1/health/db
